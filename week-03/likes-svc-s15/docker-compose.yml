version: '3.8'

services:
  likes-svc-s15:
    build: .
    container_name: likes-svc-s15
    ports:
      - "8234:8234"
    restart: unless-stopped
    networks:
      - app-network

  other-service:
    build: ./other-service
    container_name: other-service
    ports:
      - "8235:8235"
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - likes-svc-s15
      - other-service
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge