events {
    worker_connections 1024;
}

http {
    upstream likes_backend {
        server likes-svc-s15:8234;
    }

    upstream other_backend {
        server other-service:8235;
    }

    server {
        listen 80;

        location /api/likes/ {
            proxy_pass http://likes_backend/likes/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/other/ {
            proxy_pass http://other_backend/other/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            return 200 '{"status": "ok", "service": "nginx-gateway"}';
            add_header Content-Type application/json;
        }
    }
}